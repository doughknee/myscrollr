apiVersion: v1
kind: ConfigMap
metadata:
  name: core-config
  namespace: scrollr
data:
  # Derived URLs (replaces COOLIFY_FQDN build arg)
  API_URL: "https://api.myscrollr.com"
  LOGTO_URL: "https://auth.myscrollr.com/oidc"
  LOGTO_JWKS_URL: "https://auth.myscrollr.com/oidc/jwks"
  LOGTO_ENDPOINT: "https://auth.myscrollr.com"
  LOGTO_M2M_RESOURCE: "https://default.logto.app/api"
  YAHOO_CALLBACK_URL: "https://api.myscrollr.com/yahoo/callback"

  # CORS
  ALLOWED_ORIGINS: "https://myscrollr.com,https://api.myscrollr.com"
  FRONTEND_URL: "https://myscrollr.com"

  # Logto role IDs (not secret, just config)
  LOGTO_UPLINK_ROLE_ID: "x8qz9zmdthw19n10dqnr5"
  LOGTO_PRO_ROLE_ID: "mpp4isevqg194srzrhjha"
  LOGTO_ULTIMATE_ROLE_ID: "saxuo1hnzn43jtbt33zou"
  LOGTO_SUPER_USER_ROLE_ID: "saaf40fy2iaxu1bwhy0m8"

  # Stripe price IDs (not secret) — LIVE mode
  STRIPE_PRICE_MONTHLY: "price_1TMyBUFk6czwHVgrocQKaBHD"
  STRIPE_PRICE_ANNUAL: "price_1TMyBUFk6czwHVgr2AysFrfL"
  STRIPE_PRICE_LIFETIME: "price_1TMyBWFk6czwHVgr5Y2xteB7"
  STRIPE_PRICE_PRO_MONTHLY: "price_1TMyBUFk6czwHVgrc6YHoQoj"
  STRIPE_PRICE_PRO_ANNUAL: "price_1TMyBVFk6czwHVgrN2oUq6fx"
  STRIPE_PRICE_ULTIMATE_MONTHLY: "price_1TMyBVFk6czwHVgriAztoY86"
  STRIPE_PRICE_ULTIMATE_ANNUAL: "price_1TMyBVFk6czwHVgr9ntOrMXf"
  STRIPE_LIFETIME_ULTIMATE_COUPON_ID: "BLMMYMix"

  # Support / OS Ticket
  #
  # Each `OSTICKET_TOPIC_ID_*` corresponds to a category value sent by the
  # desktop client's Contact Us form (see ContactForm.tsx:23 — Category type):
  #
  #   - bug      -> OSTICKET_TOPIC_ID (the default for any unspecified/future category)
  #   - feature  -> OSTICKET_TOPIC_ID_FEATURE
  #   - feedback -> OSTICKET_TOPIC_ID_FEEDBACK
  #   - billing  -> OSTICKET_TOPIC_ID_BILLING
  #   - account  -> OSTICKET_TOPIC_ID_ACCOUNT
  #   - channel  -> OSTICKET_TOPIC_ID_CHANNEL
  #
  # Routing lives in api/core/support.go::buildOSTicketPayload. An empty
  # per-category value falls back to OSTICKET_TOPIC_ID.
  OSTICKET_URL: "https://support.myscrollr.com"
  OSTICKET_TOPIC_ID: "12"          # Bug Report (default fallback)
  OSTICKET_TOPIC_ID_FEATURE: "13"  # Feature Request
  OSTICKET_TOPIC_ID_FEEDBACK: "14" # General Feedback
  OSTICKET_TOPIC_ID_BILLING: "15"  # Billing & Subscriptions
  OSTICKET_TOPIC_ID_ACCOUNT: "16"  # Account Issues
  OSTICKET_TOPIC_ID_CHANNEL: "17"  # Channel Data Issues

  # AI Triage (Phase: ai-support-triage)
  #
  # The following secrets MUST be added manually to k8s/secrets.yaml:
  #   - ANTHROPIC_API_KEY              (Claude Haiku for triage; sk-ant-...)
  #   - RESEND_WEBHOOK_SECRET          (Svix-style secret from Resend → Webhooks)
  #   - SUPPORT_APPROVAL_HMAC_SECRET   (any high-entropy string ≥32 chars)
  AI_TRIAGE_ENABLED: "true"                       # set "false" to bypass triage and fall back to legacy flow
  SUPPORT_AGENT_EMAIL: "phil@myscrollr.com"       # CHANGEME — partner's email for approval notifications
  APPROVAL_BASE_URL: "https://api.myscrollr.com"  # base URL embedded in Send/Edit/Skip links
  OSTICKET_BCC_EMAIL: "support@myscrollr.com"     # the inbox osTicket polls for inbound piping
  SUPPORT_REPLY_FROM_EMAIL: "support@myscrollr.com"
