---
# cert-manager HTTP-01 solver pods are created on demand in this namespace
# during certificate issuance/renewal. Without this, the namespace-wide
# default-deny blocks the ACME challenge and certs stop renewing.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-acme-solver
  namespace: scrollr
spec:
  podSelector:
    matchLabels:
      acme.cert-manager.io/http01-solver: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
