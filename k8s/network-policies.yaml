# =============================================================================
# Network policies — enforce the gateway trust model at the network layer
# =============================================================================
#
# The channel APIs trust the `X-User-Sub` header set by the core API proxy
# (see api/CHANNELS.md). That trust is only sound if nothing except the core
# API can reach them. These policies make that guarantee real:
#
#   ingress-nginx ──► website:3000
#   ingress-nginx ──► core-api:8080
#   core-api      ──► {finance,sports,rss,fantasy}-api  (8081-8084)
#   {channel}-api ──► {channel}-service                  (3001/3002/3004,
#                                                         health probes)
#
# Everything else inbound is denied by the namespace-wide default-deny.
# Egress is intentionally unrestricted (policyTypes: [Ingress] everywhere) —
# pods reach the DO-managed Postgres/Redis, Logto, Stripe, and the external
# data providers, and nothing here touches that.
#
# Notes:
#   - Kubelet liveness/readiness probes and `kubectl port-forward` (used by
#     scripts/smoke/production-readiness.sh) originate from the node host,
#     which Cilium (DOKS' CNI) allows regardless of policy.
#   - cert-manager's HTTP-01 solver pods run in this namespace and must
#     accept traffic from ingress-nginx, or certificate renewal silently
#     breaks under default-deny. The last policy covers them.
#   - Adding a new channel? Copy the channel-API + channel-service pair of
#     policies and adjust app labels + ports.
#   - Rollback: kubectl delete -f k8s/network-policies.yaml
#
# The ingress-nginx namespace is matched via the automatic
# kubernetes.io/metadata.name label (k8s >= 1.21).

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: scrollr
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-website
  namespace: scrollr
spec:
  podSelector:
    matchLabels:
      app: website
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
---
