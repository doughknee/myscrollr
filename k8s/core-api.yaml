apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: scrollr
  labels:
    app: core-api
spec:
  # Two replicas for HA and zero-drop deploys (ADR-0001). Safe because
  # SSE fan-out rides Redis pub/sub per replica, channel-config changes
  # broadcast resubscribes via sse:ctl:resubscribe, and rate-limit
  # counters live in Redis — no remaining state assumes a single pod.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Never drop below the replica count during rollouts: surge a new
      # pod first, kill an old one only after the new one is Ready.
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
    spec:
      containers:
        - name: core-api
          image: registry.digitalocean.com/scrollr/core-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: core-config
            - secretRef:
                name: scrollr-secrets
          env:
            # Sentry — per-service DSN. SENTRY_USER_SALT, ENVIRONMENT,
            # and GIT_SHA come from scrollr-secrets (via envFrom above)
            # because they're shared across all services. DSNs are
            # ingestion-only (not data-exfil) so inlining in git is
            # acceptable; rotate via Sentry UI if compromised.
            - name: SENTRY_DSN
              value: "https://2cb3c4a8a71b52241c127bc46495a070@o4511384091033600.ingest.us.sentry.io/4511384381554688"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Core /health now returns 503 when any dependency is
          # degraded (see PR #108 server.go changes). Add a startupProbe
          # so a slow Postgres connection doesn't get misread as
          # liveness failure during deploy.
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 6
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: core-api
  namespace: scrollr
spec:
  selector:
    app: core-api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
# Keep at least one core-api pod through voluntary disruptions (node
# drains, cluster upgrades) — the whole API surface routes through it.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: core-api
  namespace: scrollr
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: core-api
