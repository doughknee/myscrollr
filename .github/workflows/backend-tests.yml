name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "channels/**/*.go"
      - "channels/**/*.rs"
  pull_request:
    branches: [main]
    paths:
      - "api/**"
      - "channels/**/*.go"
      - "channels/**/*.rs"

jobs:
  # ── Go tests (5 independent jobs, run in parallel) ─────────────
  go-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: api/core
            module: github.com/brandon-relentnet/myscrollr/api
          - dir: channels/finance/api
            module: github.com/brandon-relentnet/scrollr-finance
          - dir: channels/sports/api
            module: github.com/brandon-relentnet/scrollr-sports
          - dir: channels/rss/api
            module: github.com/brandon-relentnet/scrollr-rss
          - dir: channels/fantasy/api
            module: github.com/brandon-relentnet/scrollr-fantasy

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.dir }}

    # Real Postgres for integration tests (currently only api/core has
    # them — the GDPR purge cascade and Stripe webhook idempotency).
    # Tests gate on TEST_DATABASE_URL and skip when it's unset, so
    # `go test ./...` still works locally without a database.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scrollr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.21"
          cache: true
          cache-dependency-path: ${{ matrix.dir }}/go.sum

      - run: go test ./...
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/scrollr_test?sslmode=disable

  # ── Rust tests (3 independent jobs, run in parallel) ───────────
  rust-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: channels/finance/service
          - dir: channels/sports/service
          - dir: channels/rss/service

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.dir }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - run: cargo test --quiet
