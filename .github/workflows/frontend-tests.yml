name: Frontend Tests

on:
  push:
    branches: [main]
    paths:
      - "myscrollr.com/**"
      - "desktop/src/**"
      - "desktop/package*.json"
      - "desktop/vitest*.ts"
  pull_request:
    branches: [main]
    paths:
      - "myscrollr.com/**"
      - "desktop/src/**"
      - "desktop/package*.json"
      - "desktop/vitest*.ts"

jobs:
  vitest:
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: myscrollr.com
          - dir: desktop

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.dir }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - run: npm ci

      - run: npm test
