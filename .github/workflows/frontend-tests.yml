name: Frontend Tests

on:
  push:
    branches: [main]
    paths:
      - "myscrollr.com/**"
      - "desktop/src/**"
      - "desktop/package*.json"
      - "desktop/vitest*.ts"
      # Tier-limit drift guard: both frontends pin their hardcoded tier
      # tables to this snapshot, so an edit to it must re-run their tests.
      - "api/core/tier_limits.json"
      # Self-trigger on workflow edits (same gap that let the setup-go@v6
      # breakage ship silently in backend-tests).
      - ".github/workflows/frontend-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "myscrollr.com/**"
      - "desktop/src/**"
      - "desktop/package*.json"
      - "desktop/vitest*.ts"
      # Tier-limit drift guard: both frontends pin their hardcoded tier
      # tables to this snapshot, so an edit to it must re-run their tests.
      - "api/core/tier_limits.json"
      # Self-trigger on workflow edits (same gap that let the setup-go@v6
      # breakage ship silently in backend-tests).
      - ".github/workflows/frontend-tests.yml"

jobs:
  vitest:
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: myscrollr.com
          - dir: desktop

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.dir }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - run: npm ci

      - run: npm test
