name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform(s)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-release.yml"

permissions:
  contents: write

env:
  # tauri-action@v0 still uses Node 20 internally
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Resolve the build matrix based on the selected platform ────
  # Push triggers and "all" both build every target. Selecting a single
  # platform via workflow_dispatch produces a one-entry matrix.
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      has-linux: ${{ steps.set.outputs.has_linux }}
    steps:
      - id: set
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          case "$PLATFORM" in
            windows)
              echo 'matrix={"include":[{"platform":"windows-latest","rust_target":"x86_64-pc-windows-msvc"}]}' >> "$GITHUB_OUTPUT"
              echo "has_linux=false" >> "$GITHUB_OUTPUT"
              ;;
            macos)
              echo 'matrix={"include":[{"platform":"macos-14","rust_target":"aarch64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              echo "has_linux=false" >> "$GITHUB_OUTPUT"
              ;;
            linux)
              echo 'matrix={"include":[{"platform":"ubuntu-22.04","rust_target":"x86_64-unknown-linux-gnu"}]}' >> "$GITHUB_OUTPUT"
              echo "has_linux=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'matrix={"include":[{"platform":"ubuntu-22.04","rust_target":"x86_64-unknown-linux-gnu"},{"platform":"windows-latest","rust_target":"x86_64-pc-windows-msvc"},{"platform":"macos-14","rust_target":"aarch64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              echo "has_linux=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

  # ── Build ──────────────────────────────────────────────────────
  build:
    needs: [matrix-setup]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target"
          cache-on-failure: "true"

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate desktop release env
        shell: bash
        env:
          DESKTOP_VITE_API_URL: ${{ secrets.DESKTOP_VITE_API_URL }}
          DESKTOP_VITE_AUTH_ENDPOINT: ${{ secrets.DESKTOP_VITE_AUTH_ENDPOINT }}
          DESKTOP_VITE_LOGTO_APP_ID: ${{ secrets.DESKTOP_VITE_LOGTO_APP_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          for var in DESKTOP_VITE_API_URL DESKTOP_VITE_AUTH_ENDPOINT DESKTOP_VITE_LOGTO_APP_ID; do
            value="$(printf '%s' "${!var}" | xargs)"

            if [ -z "$value" ]; then
              echo "Missing required desktop release secret: $var" >&2
              exit 1
            fi

            printf -v "$var" '%s' "$value"
          done

          if [ -z "$(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY")" ]; then
            echo "Missing required desktop release secret: TAURI_SIGNING_PRIVATE_KEY" >&2
            exit 1
          fi

          if [ "$DESKTOP_VITE_AUTH_ENDPOINT" = "your_local_auth_endpoint" ] || [ "$DESKTOP_VITE_LOGTO_APP_ID" = "your_local_or_dev_logto_app_id" ]; then
            echo "Desktop release secrets must be real production values, not .env.example placeholders" >&2
            exit 1
          fi

          case "$DESKTOP_VITE_API_URL" in
            http://localhost*|https://localhost*|http://127.0.0.1*|https://127.0.0.1*)
              echo "Desktop release API URL must point at production, not localhost" >&2
              exit 1
              ;;
          esac

          case "$DESKTOP_VITE_API_URL" in
            https://*) ;;
            *)
              echo "Desktop release API URL must use HTTPS" >&2
              exit 1
              ;;
          esac

          case "$DESKTOP_VITE_AUTH_ENDPOINT" in
            http://localhost*|https://localhost*|http://127.0.0.1*|https://127.0.0.1*)
              echo "Desktop release auth endpoint must point at production, not localhost" >&2
              exit 1
              ;;
          esac

          case "$DESKTOP_VITE_AUTH_ENDPOINT" in
            https://*) ;;
            *)
              echo "Desktop release auth endpoint must use HTTPS" >&2
              exit 1
              ;;
          esac

          case "$DESKTOP_VITE_AUTH_ENDPOINT" in
            */oidc/auth|*/oidc/auth/)
              echo "Desktop release auth endpoint must be the Logto base URL, not the full /oidc/auth path" >&2
              exit 1
              ;;
          esac

      - name: Audit Node dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit Rust dependencies
        run: cargo install cargo-audit --quiet && cargo audit
        working-directory: desktop/src-tauri
        continue-on-error: true

      # tauri-action builds, signs updater artifacts, creates/updates
      # the GitHub release, and assembles latest.json across all platforms.
      # Logto desktop app must allow callback http://127.0.0.1:19284/callback
      # and API resource https://api.myscrollr.com for production releases.
      #
      # Apple secrets (APPLE_*) are only consumed by macOS builds. tauri-action
      # imports the .p12 into a temporary keychain, codesigns the .app bundle,
      # then submits to notarytool for Apple notarization. Other matrix targets
      # (Windows, Linux) ignore them. If any APPLE_* secret is missing on a
      # macOS build, tauri-action skips signing and produces an unsigned bundle
      # (the build still succeeds, just without notarization). We don't fail
      # the workflow on missing Apple secrets so the Linux/Windows builds keep
      # working during initial rollout / cert renewal.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VITE_API_URL: ${{ secrets.DESKTOP_VITE_API_URL }}
          VITE_AUTH_ENDPOINT: ${{ secrets.DESKTOP_VITE_AUTH_ENDPOINT }}
          VITE_LOGTO_APP_ID: ${{ secrets.DESKTOP_VITE_LOGTO_APP_ID }}
          # Apple code-signing + notarization (macOS only; ignored on other runners)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tauriScript: npx tauri
          tagName: desktop-v__VERSION__
          releaseName: "Scrollr desktop-v__VERSION__"
          releaseBody: "See the [full changelog](https://github.com/brandon-relentnet/myscrollr/commits/desktop-v__VERSION__) for details."
          releaseDraft: true
          prerelease: false

      # ── Fix AppImage for rolling-release distros ───────────────
      # Bundled Ubuntu 22.04 libwayland-* are ABI-incompatible with
      # newer Mesa on Arch, Fedora, etc. We repackage without them,
      # then replace the release asset so direct downloads get the fix.
      - name: Fix AppImage for rolling-release distros
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="desktop-v$(jq -r .version src-tauri/tauri.conf.json)"
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          if [ -n "$APPIMAGE" ]; then
            chmod +x "$APPIMAGE"
            "$APPIMAGE" --appimage-extract
            rm -f squashfs-root/usr/lib/libwayland-*.so.*
            wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x appimagetool-x86_64.AppImage
            ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run squashfs-root "$APPIMAGE"
            rm -rf squashfs-root appimagetool-x86_64.AppImage

            gh release upload "$TAG" "$APPIMAGE" --clobber --repo "$GITHUB_REPOSITORY"
          fi

  # ── Re-sign the repackaged AppImage ────────────────────────────
  # The libwayland fix above replaces the AppImage binary on the
  # release, invalidating the original signature from tauri-action.
  # This job runs AFTER all builds complete (so latest.json is fully
  # assembled), re-signs the patched AppImage, and patches both the
  # .sig asset and the signature entries in latest.json.
  #
  # Uses !cancelled() so it runs even if macOS or Windows builds fail
  # — the Linux AppImage still needs its signature fixed.
  fix-appimage-signature:
    needs: [matrix-setup, build]
    if: ${{ !cancelled() && needs.build.result != 'skipped' && needs.matrix-setup.outputs.has-linux == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: desktop/src-tauri/tauri.conf.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Re-sign AppImage and patch latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          TAG="desktop-v$(jq -r .version desktop/src-tauri/tauri.conf.json)"

          gh release download "$TAG" --pattern '*.AppImage' -D /tmp --repo "$GITHUB_REPOSITORY"
          APPIMAGE=$(find /tmp -name '*.AppImage' | head -1)

          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found on release, skipping"
            exit 0
          fi

          npx --yes @tauri-apps/cli signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" "$APPIMAGE"

          gh release upload "$TAG" "$APPIMAGE.sig" --clobber --repo "$GITHUB_REPOSITORY"

          NEW_SIG=$(cat "$APPIMAGE.sig")
          gh release download "$TAG" --pattern 'latest.json' -D /tmp --repo "$GITHUB_REPOSITORY"

          jq --arg sig "$NEW_SIG" '
            .platforms["linux-x86_64"].signature = $sig |
            .platforms["linux-x86_64-appimage"].signature = $sig
          ' /tmp/latest.json > /tmp/latest_patched.json

          mv /tmp/latest_patched.json /tmp/latest.json
          gh release upload "$TAG" /tmp/latest.json --clobber --repo "$GITHUB_REPOSITORY"

          echo "AppImage re-signed and latest.json patched successfully"
