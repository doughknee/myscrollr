name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform(s)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
  push:
    branches: [main]
    # Pattern order matters: a negated pattern after a positive match excludes
    # the path. The workflow still runs if at least one changed file survives
    # the net filter, so a push touching both a test file and a source file
    # still builds. Excluded files are covered by frontend-tests.yml, and
    # tsconfig.json deliberately stays included — it is an input to the
    # release build (vite build && tsc --noEmit).
    paths:
      - "desktop/**"
      # Test-only changes don't need release artifacts.
      - "!desktop/src/**/*.test.ts"
      - "!desktop/src/**/*.test.tsx"
      - "!desktop/vitest*.ts"
      # Docs and dev tooling that never reach the release artifacts.
      - "!desktop/**/*.md"
      - "!desktop/.env.example"
      - "!desktop/screenshots/**"
      - "!desktop/scripts/capture-screenshots.mjs"
      - ".github/workflows/desktop-release.yml"

permissions:
  contents: write

env:
  # tauri-action@v0 still uses Node 20 internally
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Resolve the build matrix based on the selected platform ────
  # Push triggers and "all" both build every target. Selecting a single
  # platform via workflow_dispatch produces a one-entry matrix.
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      has-linux: ${{ steps.set.outputs.has_linux }}
    steps:
      - id: set
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          case "$PLATFORM" in
            windows)
              echo 'matrix={"include":[{"platform":"windows-latest","rust_target":"x86_64-pc-windows-msvc"}]}' >> "$GITHUB_OUTPUT"
              echo "has_linux=false" >> "$GITHUB_OUTPUT"
              ;;
            macos)
              echo 'matrix={"include":[{"platform":"macos-14","rust_target":"aarch64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              echo "has_linux=false" >> "$GITHUB_OUTPUT"
              ;;
            linux)
              echo 'matrix={"include":[{"platform":"ubuntu-22.04","rust_target":"x86_64-unknown-linux-gnu"}]}' >> "$GITHUB_OUTPUT"
              echo "has_linux=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'matrix={"include":[{"platform":"ubuntu-22.04","rust_target":"x86_64-unknown-linux-gnu"},{"platform":"windows-latest","rust_target":"x86_64-pc-windows-msvc"},{"platform":"macos-14","rust_target":"aarch64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              echo "has_linux=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

  # ── Build ──────────────────────────────────────────────────────
  build:
    needs: [matrix-setup]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    # Healthy desktop builds (incl. macOS notarize) complete in ~10 min. We cap
    # the job at 25 min so a stuck notarytool poll — e.g. when a macos-14 runner
    # loses network mid-submission and Foundation returns NSURLErrorDomain
    # Code=-1009 — fails fast instead of consuming the full 6h GitHub default.
    # See run #25578604859: notarize hung for 51 min on a "No network route"
    # error before the workflow gave up. With this cap, the same flake costs
    # ~25 min and frees the runner for a retry.
    timeout-minutes: 25
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      # macOS-14 GitHub-hosted runners ship a Homebrew-installed rustup at
      # /opt/homebrew/bin/cargo where `cargo` is actually a `rustup-init`
      # stub with self-update disabled ("info: self-update is disabled for
      # this build of rustup"). After dtolnay/rust-toolchain installs the
      # real toolchain at $CARGO_HOME/bin, that path appears AFTER
      # /opt/homebrew/bin on PATH, so `cargo metadata` (called by
      # tauri-action's preflight) resolves to the Homebrew stub and fails
      # with "unexpected argument 'metadata' found / Usage:
      # rustup-init[EXE]". Writing $CARGO_HOME/bin to $GITHUB_PATH
      # prepends it for subsequent steps, so the real cargo wins.
      # Linux and Windows runners are unaffected because rustup is
      # installed differently there. See run #25767628199 for the
      # original failure.
      - name: Prefer $CARGO_HOME/bin on PATH (macOS-14 Homebrew rustup workaround)
        if: matrix.platform == 'macos-14'
        shell: bash
        working-directory: .
        run: |
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
          echo "Before workaround, cargo resolves to: $(command -v cargo || echo 'not found')"
          echo "Real cargo at \$CARGO_HOME/bin/cargo: $($CARGO_HOME/bin/cargo --version)"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          # Do not restore ~/.cargo/bin on macOS: a poisoned cache can replace
          # cargo with rustup-init and break cargo metadata inside tauri-action.
          prefix-key: "v1-rust-no-bin"
          workspaces: "desktop/src-tauri -> target"
          cache-on-failure: "true"
          cache-bin: "false"

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate desktop release env
        shell: bash
        env:
          DESKTOP_VITE_API_URL: ${{ secrets.DESKTOP_VITE_API_URL }}
          DESKTOP_VITE_AUTH_ENDPOINT: ${{ secrets.DESKTOP_VITE_AUTH_ENDPOINT }}
          DESKTOP_VITE_LOGTO_APP_ID: ${{ secrets.DESKTOP_VITE_LOGTO_APP_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          for var in DESKTOP_VITE_API_URL DESKTOP_VITE_AUTH_ENDPOINT DESKTOP_VITE_LOGTO_APP_ID; do
            value="$(printf '%s' "${!var}" | xargs)"

            if [ -z "$value" ]; then
              echo "Missing required desktop release secret: $var" >&2
              exit 1
            fi

            printf -v "$var" '%s' "$value"
          done

          if [ -z "$(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY")" ]; then
            echo "Missing required desktop release secret: TAURI_SIGNING_PRIVATE_KEY" >&2
            exit 1
          fi

          if [ "$DESKTOP_VITE_AUTH_ENDPOINT" = "your_local_auth_endpoint" ] || [ "$DESKTOP_VITE_LOGTO_APP_ID" = "your_local_or_dev_logto_app_id" ]; then
            echo "Desktop release secrets must be real production values, not .env.example placeholders" >&2
            exit 1
          fi

          case "$DESKTOP_VITE_API_URL" in
            http://localhost*|https://localhost*|http://127.0.0.1*|https://127.0.0.1*)
              echo "Desktop release API URL must point at production, not localhost" >&2
              exit 1
              ;;
          esac

          case "$DESKTOP_VITE_API_URL" in
            https://*) ;;
            *)
              echo "Desktop release API URL must use HTTPS" >&2
              exit 1
              ;;
          esac

          case "$DESKTOP_VITE_AUTH_ENDPOINT" in
            http://localhost*|https://localhost*|http://127.0.0.1*|https://127.0.0.1*)
              echo "Desktop release auth endpoint must point at production, not localhost" >&2
              exit 1
              ;;
          esac

          case "$DESKTOP_VITE_AUTH_ENDPOINT" in
            https://*) ;;
            *)
              echo "Desktop release auth endpoint must use HTTPS" >&2
              exit 1
              ;;
          esac

          case "$DESKTOP_VITE_AUTH_ENDPOINT" in
            */oidc/auth|*/oidc/auth/)
              echo "Desktop release auth endpoint must be the Logto base URL, not the full /oidc/auth path" >&2
              exit 1
              ;;
          esac

      - name: Audit Node dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit Rust dependencies
        run: cargo install cargo-audit --quiet && cargo audit
        working-directory: desktop/src-tauri
        continue-on-error: true

      # tauri-action builds, signs updater artifacts, creates/updates
      # the GitHub release, and assembles latest.json across all platforms.
      # Logto desktop app must allow callback http://127.0.0.1:19284/callback
      # and API resource https://api.myscrollr.com for production releases.
      #
      # Apple secrets (APPLE_*) are only consumed by macOS builds. tauri-action
      # imports the .p12 into a temporary keychain, codesigns the .app bundle,
      # then submits to notarytool for Apple notarization. Other matrix targets
      # (Windows, Linux) ignore them.
      #
      # Tauri's bundler triggers notarization automatically when APPLE_ID,
      # APPLE_PASSWORD, AND APPLE_TEAM_ID are all set in the environment
      # (verified against tauri-bundler/src/bundle/macos/sign.rs::notarize_auth
      # and app.rs:135). Setting any of them to an empty string is NOT the
      # same as unsetting — Rust's `var_os()` returns `Some("")` for empty
      # values, which the bundler accepts as "credentials present" and then
      # fails downstream at notarytool's "Team ID must be at least 3 chars"
      # validation. So we always pass the real secrets; if you need to skip
      # notarize for a specific reason, comment the three lines below.
      #
      # The 25-min job-level timeout-minutes (above) bounds the notarize-poll
      # hang documented in run #25578604859, where the macos-14 runner lost
      # network connectivity (NSURLErrorDomain -1009, "No network route")
      # mid-poll on submission 43b5a62e-…. Without the cap, that flake
      # consumed 51 min before tauri-action gave up.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VITE_API_URL: ${{ secrets.DESKTOP_VITE_API_URL }}
          VITE_AUTH_ENDPOINT: ${{ secrets.DESKTOP_VITE_AUTH_ENDPOINT }}
          VITE_LOGTO_APP_ID: ${{ secrets.DESKTOP_VITE_LOGTO_APP_ID }}
          # Sentry — error monitoring. All four are optional: when any is
          # unset, the corresponding integration becomes a no-op (the Vite
          # plugin skips source map upload; the Rust binary's option_env!
          # returns None and the SDK is disabled). The JS-side DSN is the
          # same project as the Rust DSN — split into two env vars so each
          # is grep-able and CI can wire them independently.
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN_DESKTOP_WEBVIEW }}
          SENTRY_DSN_RUST: ${{ secrets.SENTRY_DSN_DESKTOP_RUST }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          # Apple code-signing (macOS only; ignored on other runners).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Apple notarization (macOS only; ignored on other runners).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tauriScript: npx tauri
          tagName: desktop-v__VERSION__
          releaseName: "Scrollr desktop-v__VERSION__"
          releaseBody: "See the [full changelog](https://github.com/brandon-relentnet/myscrollr/commits/desktop-v__VERSION__) for details."
          releaseDraft: true
          prerelease: false

      # ── Register the release in Sentry ─────────────────────────
      # Tells Sentry the release exists so events get clustered correctly.
      # Source map upload itself happens inside `npm run build` (via the
      # @sentry/vite-plugin); this step just registers the release name.
      # Runs only on Linux to avoid three duplicate registrations across
      # the matrix. continue-on-error keeps a Sentry-side flake from
      # failing the whole release pipeline.
      - name: Register Sentry release
        if: matrix.platform == 'ubuntu-22.04' && env.SENTRY_AUTH_TOKEN != '' && env.SENTRY_ORG != ''
        uses: getsentry/action-release@v3
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: scrollr-desktop
        with:
          environment: production
          version: scrollr-desktop@${{ github.ref_name }}

      # ── Notarize and staple the macOS DMG ──────────────────────
      # tauri-action only notarizes the .app bundle inside the DMG, leaving
      # the DMG container itself signed-but-unnotarized. That gives users a
      # "macOS cannot verify the developer of this disk image" warning when
      # they double-click the downloaded DMG, even though the .app inside is
      # fully trusted post-mount. This step closes that gap by submitting
      # the DMG to Apple's notary service and stapling the resulting ticket
      # to the disk image, so Gatekeeper accepts it silently on download.
      #
      # Verified gap: spctl --assess --type install on the unstapled DMG
      # returned "rejected, source=Unnotarized Developer ID" against
      # release Scrollr_1.0.9_aarch64.dmg before this step was added.
      #
      # continue-on-error: true so a runner-network flake during this
      # second notary submission (see run #25578604859 — NSURLErrorDomain
      # -1009 mid-poll) doesn't block the pipeline. The .app inside and the
      # updater stream are unaffected; users who download mid-flake see one
      # extra Gatekeeper prompt that self-heals on the next push.
      #
      # The DMG was already Developer ID-signed by tauri-action; stapling
      # attaches the notarization ticket without re-signing.
      - name: Notarize and staple DMG
        if: matrix.platform == 'macos-14'
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DMG=$(find src-tauri/target/release/bundle/dmg -name '*.dmg' | head -1)
          if [ -z "$DMG" ]; then
            echo "::warning::No DMG found at src-tauri/target/release/bundle/dmg; skipping DMG notarization"
            exit 0
          fi

          echo "Notarizing $DMG..."
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 15m

          echo "Stapling $DMG..."
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

          echo "Re-uploading stapled DMG to release..."
          TAG="desktop-v$(jq -r .version src-tauri/tauri.conf.json)"
          gh release upload "$TAG" "$DMG" --clobber --repo "$GITHUB_REPOSITORY"

      # ── Fix AppImage for rolling-release distros ───────────────
      # Bundled Ubuntu 22.04 libwayland-* are ABI-incompatible with
      # newer Mesa on Arch, Fedora, etc. We repackage without them,
      # then replace the release asset so direct downloads get the fix.
      - name: Fix AppImage for rolling-release distros
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="desktop-v$(jq -r .version src-tauri/tauri.conf.json)"
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          if [ -n "$APPIMAGE" ]; then
            chmod +x "$APPIMAGE"
            "$APPIMAGE" --appimage-extract
            rm -f squashfs-root/usr/lib/libwayland-*.so.*
            wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x appimagetool-x86_64.AppImage
            ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run squashfs-root "$APPIMAGE"
            rm -rf squashfs-root appimagetool-x86_64.AppImage

            gh release upload "$TAG" "$APPIMAGE" --clobber --repo "$GITHUB_REPOSITORY"
          fi

  # ── Re-sign the repackaged AppImage ────────────────────────────
  # The libwayland fix above replaces the AppImage binary on the
  # release, invalidating the original signature from tauri-action.
  # This job runs AFTER all builds complete (so latest.json is fully
  # assembled), re-signs the patched AppImage, and patches both the
  # .sig asset and the signature entries in latest.json.
  #
  # Uses !cancelled() so it runs even if macOS or Windows builds fail
  # — the Linux AppImage still needs its signature fixed.
  fix-appimage-signature:
    needs: [matrix-setup, build]
    if: ${{ !cancelled() && needs.build.result != 'skipped' && needs.matrix-setup.outputs.has-linux == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: desktop/src-tauri/tauri.conf.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Re-sign AppImage and patch latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          TAG="desktop-v$(jq -r .version desktop/src-tauri/tauri.conf.json)"

          gh release download "$TAG" --pattern '*.AppImage' -D /tmp --repo "$GITHUB_REPOSITORY"
          APPIMAGE=$(find /tmp -name '*.AppImage' | head -1)

          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found on release, skipping"
            exit 0
          fi

          npx --yes @tauri-apps/cli signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" "$APPIMAGE"

          gh release upload "$TAG" "$APPIMAGE.sig" --clobber --repo "$GITHUB_REPOSITORY"

          NEW_SIG=$(cat "$APPIMAGE.sig")
          gh release download "$TAG" --pattern 'latest.json' -D /tmp --repo "$GITHUB_REPOSITORY"

          jq --arg sig "$NEW_SIG" '
            .platforms["linux-x86_64"].signature = $sig |
            .platforms["linux-x86_64-appimage"].signature = $sig
          ' /tmp/latest.json > /tmp/latest_patched.json

          mv /tmp/latest_patched.json /tmp/latest.json
          gh release upload "$TAG" /tmp/latest.json --clobber --repo "$GITHUB_REPOSITORY"

          echo "AppImage re-signed and latest.json patched successfully"
